<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 150">
  <defs>
    <linearGradient id="rainCloudTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C8B93"/>
      <stop offset="100%" stop-color="#586771"/>
    </linearGradient>
    <linearGradient id="rainCloudBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C5A63"/>
      <stop offset="100%" stop-color="#333F47"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BFE0F2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4E8FBF" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- cloud body -->
  <ellipse cx="60" cy="50" rx="46" ry="28" fill="url(#rainCloudBase)"/>
  <ellipse cx="105" cy="45" rx="52" ry="34" fill="url(#rainCloudBase)"/>
  <ellipse cx="65" cy="34" rx="40" ry="26" fill="url(#rainCloudTop)"/>
  <ellipse cx="108" cy="28" rx="44" ry="28" fill="url(#rainCloudTop)"/>

  <!-- rain streaks with teardrop tips -->
  <g stroke="#3A6EA5" stroke-width="4.5" stroke-linecap="round">
    <line x1="42" y1="88" x2="30" y2="118"/>
    <line x1="66" y1="90" x2="56" y2="122"/>
    <line x1="90" y1="86" x2="80" y2="116"/>
    <line x1="114" y1="90" x2="104" y2="122"/>
    <line x1="54" y1="102" x2="46" y2="132"/>
    <line x1="100" y1="104" x2="92" y2="134"/>
  </g>
  <g fill="url(#dropGrad)">
    <ellipse cx="29" cy="122" rx="3.4" ry="5"/>
    <ellipse cx="55" cy="126" rx="3.4" ry="5"/>
    <ellipse cx="79" cy="120" rx="3.4" ry="5"/>
    <ellipse cx="103" cy="126" rx="3.4" ry="5"/>
  </g>
</svg>
