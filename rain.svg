<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 170">
  <defs>
    <linearGradient id="stormCloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A6772"/>
      <stop offset="100%" stop-color="#2E3841"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="100%" stop-color="#F0B429"/>
    </linearGradient>
    <filter id="boltGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="65" cy="40" rx="55" ry="30" fill="url(#stormCloud)"/>
  <ellipse cx="35" cy="48" rx="32" ry="22" fill="url(#stormCloud)"/>
  <ellipse cx="95" cy="48" rx="34" ry="24" fill="url(#stormCloud)"/>

  <polygon points="75,58 42,110 62,110 48,160 100,95 76,95 90,58"
           fill="url(#boltGrad)" filter="url(#boltGlow)"/>
</svg>
