<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130">
  <defs>
    <linearGradient id="cloudTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D7DEE0"/>
    </linearGradient>
    <linearGradient id="cloudBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4CDCF"/>
      <stop offset="100%" stop-color="#9CA8AB"/>
    </linearGradient>
    <filter id="cloudSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="110" cy="112" rx="80" ry="12" fill="#000000" opacity="0.08"/>

  <!-- base puffs (darker, shaded underside) -->
  <ellipse cx="70" cy="80" rx="48" ry="30" fill="url(#cloudBase)"/>
  <ellipse cx="150" cy="78" rx="55" ry="34" fill="url(#cloudBase)"/>
  <ellipse cx="110" cy="92" rx="65" ry="26" fill="url(#cloudBase)"/>

  <!-- top puffs (lit) -->
  <ellipse cx="65" cy="62" rx="42" ry="30" fill="url(#cloudTop)" filter="url(#cloudSoft)"/>
  <ellipse cx="115" cy="48" rx="52" ry="38" fill="url(#cloudTop)" filter="url(#cloudSoft)"/>
  <ellipse cx="160" cy="65" rx="40" ry="28" fill="url(#cloudTop)" filter="url(#cloudSoft)"/>
  <ellipse cx="95" cy="72" rx="46" ry="24" fill="url(#cloudTop)" filter="url(#cloudSoft)" opacity="0.9"/>
</svg>
